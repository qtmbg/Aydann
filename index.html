      let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);

    function RewardsView({ T, data, setData }) {
      const xp = data.xp || 0;
      const rewards = data.rewards || {};
      const [picking, setPicking] = React.useState(null); // id of reward being claimed

      const claimReward = (id, optionIdx) => {
        setData(p => ({ ...p, rewards: { ...p.rewards, [id]: { status:"claimed", option:optionIdx, claimedDate: new Date().toISOString() } } }));
        setPicking(null);
      };

      return (
        <div style={{ padding:"0 4px" }}>
          <div style={{ fontSize:22, fontWeight:900, marginBottom:6, display:"flex", alignItems:"center", gap:10 }}>
            🎁 <span>Mes Récompenses</span>
          </div>
          <div style={{ fontSize:13, color:T.mt, fontWeight:700, marginBottom:20 }}>
            Atteins un palier XP → choisis ta récompense → Papa confirme 🎉
          </div>

          {REWARDS.map((rw, i) => {
            const st = rewards[rw.id];
            const unlocked = xp >= rw.xp;
            const status = st?.status || (unlocked ? "claimable" : "locked");
            const pct = !unlocked ? Math.min(100, Math.round((xp / rw.xp) * 100)) : 100;
            const isClaiming = picking === rw.id;

            let borderColor = T.bd, bgColor = T.sf, badgeBg = T.bd, badgeColor = T.mt, badgeLabel = "🔒 Verrouillé";
            if (status === "claimable") { borderColor = "#FFC800"; bgColor = "#FFC80012"; badgeBg = "#FFC800"; badgeColor = "#000"; badgeLabel = "🎁 À réclamer !"; }
            if (status === "claimed")   { borderColor = "#1CB0F6"; bgColor = "#1CB0F612"; badgeBg = "#1CB0F6"; badgeColor = "#fff"; badgeLabel = "⏳ En attente Papa"; }
            if (status === "given")     { borderColor = "#58CC02"; bgColor = "#58CC0212"; badgeBg = "#58CC02"; badgeColor = "#fff"; badgeLabel = "✅ Reçu !"; }

            return (
              <div key={rw.id} className="pop" style={{ background:bgColor, border:`2px solid ${borderColor}`, borderBottomWidth:5, borderRadius:20, padding:"14px 16px", marginBottom:14, animationDelay:`${i*0.05}s`, opacity:status==="locked"?0.6:1 }}>
                {/* Header */}
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
                  <div>
                    <div style={{ fontWeight:900, fontSize:16 }}>{rw.rank}</div>
                    <div style={{ fontSize:12, color:T.mt, fontWeight:700 }}>{rw.xp} XP requis</div>
                  </div>
                  <div style={{ background:badgeBg, color:badgeColor, borderRadius:12, padding:"4px 10px", fontSize:12, fontWeight:800, whiteSpace:"nowrap" }}>{badgeLabel}</div>
                </div>

                {/* Progress bar (only if locked) */}
                {status === "locked" && (
                  <div style={{ marginBottom:10 }}>
                    <div style={{ height:6, background:T.bd, borderRadius:3, overflow:"hidden" }}>
                      <div style={{ height:"100%", width:`${pct}%`, background:"#FFC800", borderRadius:3, transition:"width 0.5s" }} />
                    </div>
                    <div style={{ fontSize:11, color:T.mt, fontWeight:700, marginTop:4 }}>{xp} / {rw.xp} XP — encore {rw.xp - xp} XP</div>
                  </div>
                )}

                {/* Options */}
                {status === "claimed" && st?.option !== undefined && (
                  <div style={{ background:T.bg, borderRadius:12, padding:"8px 12px", fontSize:14, fontWeight:700, color:T.tx, marginBottom:8 }}>
                    {rw.options[st.option]}
                  </div>
                )}
                {status === "given" && st?.option !== undefined && (
                  <div style={{ background:T.bg, borderRadius:12, padding:"8px 12px", fontSize:14, fontWeight:700, color:"#58CC02", marginBottom:8 }}>
                    {rw.options[st.option]}
                  </div>
                )}

                {/* Claim button */}
                {status === "claimable" && !isClaiming && (
                  <button className="push" onClick={() => rw.options.length === 1 ? claimReward(rw.id, 0) : setPicking(rw.id)}
                    style={{ background:"#FFC800", color:"#000", border:"none", borderRadius:14, padding:"12px 20px", fontWeight:900, cursor:"pointer", fontSize:15, width:"100%", boxShadow:"0 4px 0 #C89E00", marginTop:4 }}>
                    🎁 Réclamer cette récompense !
                  </button>
                )}

                {/* Option picker (multi-choice rewards) */}
                {status === "claimable" && isClaiming && (
                  <div style={{ marginTop:8 }}>
                    <div style={{ fontSize:13, fontWeight:800, color:T.mt, marginBottom:8 }}>Choisis ta récompense :</div>
                    {rw.options.map((opt, oi) => (
                      <button key={oi} className="push" onClick={() => claimReward(rw.id, oi)}
                        style={{ display:"block", width:"100%", background:T.bg, border:`2px solid ${T.bd}`, borderBottomWidth:4, borderRadius:14, padding:"12px 14px", marginBottom:8, textAlign:"left", fontWeight:700, fontSize:14, color:T.tx, cursor:"pointer" }}>

                  </div>
                )}
              </div>
            );
          })}

      );

    function CalendarView({ T, data, getDarker }) {
      const [calMonth, setCalMonth] = React.useState(new Date());
      const DAILY_MIN = 1;

      const activityByDate = React.useMemo(() => {
        const map = {};
        Object.entries(data.answers || {}).forEach(([id, ans]) => {
          if (!ans.date) return;
          const d = new Date(ans.date);
          const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
          if (!map[key]) map[key] = { count: 0, xp: 0 };
          map[key].count++;
        });
        return map;
      }, [data.answers]);

      const year = calMonth.getFullYear();
      const month = calMonth.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = new Date();
      const monthNames = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

      let activeDays = 0, goalDays = 0;
      for (let d = 1; d <= daysInMonth; d++) {
        const key = `${year}-${month}-${d}`;
        const dayDate = new Date(year, month, d);
        if (dayDate > today) continue;
        goalDays++;
        if (activityByDate[key]?.count >= DAILY_MIN) activeDays++;
      }
      const monthPct = goalDays > 0 ? Math.round((activeDays / goalDays) * 100) : 0;

      const cells = [];
      const startPad = firstDay === 0 ? 6 : firstDay - 1;
      for (let i = 0; i < startPad; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) cells.push(d);

      return (
        <div style={{ padding:"0 4px" }}>
          <div style={{ fontSize:22, fontWeight:900, marginBottom:16, display:"flex", alignItems:"center", gap:10 }}>
            📅 <span>Calendrier</span>
          </div>

          <div style={{ background:T.sf, border:`2px solid ${T.bd}`, borderBottomWidth:5, borderRadius:20, padding:16, marginBottom:16 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
              <div style={{ fontWeight:800, fontSize:16 }}>🎯 Objectif journalier : {DAILY_MIN} exercice/jour</div>
              <div style={{ fontWeight:900, fontSize:20, color: monthPct >= 80 ? "#58CC02" : monthPct >= 50 ? "#FFC800" : "#FF4B4B" }}>{monthPct}%</div>
            </div>
            <div style={{ height:10, background:T.bd, borderRadius:5, overflow:"hidden" }}>
              <div style={{ height:"100%", width:`${monthPct}%`, background: monthPct >= 80 ? "#58CC02" : monthPct >= 50 ? "#FFC800" : "#FF4B4B", borderRadius:5, transition:"width 0.5s ease" }} />
            </div>
            <div style={{ fontSize:13, color:T.mt, marginTop:8, fontWeight:700 }}>
              {activeDays} jour{activeDays > 1 ? "s" : ""} actif{activeDays > 1 ? "s" : ""} sur {goalDays} jour{goalDays > 1 ? "s" : ""} écoulés ce mois
            </div>
          </div>

          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <button onClick={()=>setCalMonth(new Date(year, month-1, 1))} style={{ background:T.sf, border:`2px solid ${T.bd}`, borderRadius:14, padding:"8px 16px", fontWeight:800, cursor:"pointer", color:T.tx, fontSize:18 }}>‹</button>
            <div style={{ fontWeight:900, fontSize:18 }}>{monthNames[month]} {year}</div>
            <button onClick={()=>setCalMonth(new Date(year, month+1, 1))} style={{ background:T.sf, border:`2px solid ${T.bd}`, borderRadius:14, padding:"8px 16px", fontWeight:800, cursor:"pointer", color:T.tx, fontSize:18 }}>›</button>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"repeat(7, 1fr)", gap:4, marginBottom:4 }}>
            {["Lu","Ma","Me","Je","Ve","Sa","Di"].map(d => (
              <div key={d} style={{ textAlign:"center", fontSize:12, fontWeight:800, color:T.mt, padding:"4px 0" }}>{d}</div>
            ))}
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"repeat(7, 1fr)", gap:4 }}>
            {cells.map((day, i) => {
              if (!day) return <div key={`pad-${i}`} />;
              const key = `${year}-${month}-${day}`;
              const activity = activityByDate[key];
              const dayDate = new Date(year, month, day);
              const isPast = dayDate < today && dayDate.toDateString() !== today.toDateString();
              const isToday = dayDate.toDateString() === today.toDateString();
              const isFuture = dayDate > today;
              const hasGoal = activity?.count >= DAILY_MIN;
              const hasSome = activity?.count > 0;

              let bg = T.bg, border = T.bd, color = T.mt;
              if (isToday) { bg = "#1CB0F620"; border = "#1CB0F6"; color = T.tx; }
              if (hasGoal) { bg = "#58CC0230"; border = "#58CC02"; color = "#58CC02"; }
              else if (hasSome) { bg = "#FFC80025"; border = "#FFC800"; color = "#FFC800"; }
              else if (isPast) { bg = "#FF4B4B10"; border = "#FF4B4B30"; color = "#FF4B4B60"; }

              return (
                <div key={day} style={{ background:bg, border:`2px solid ${border}`, borderRadius:12, padding:"8px 4px", textAlign:"center", position:"relative", opacity:isFuture ? 0.35 : 1 }}>
                  <div style={{ fontWeight:800, fontSize:14, color }}>{day}</div>
                  {activity?.count > 0 && <div style={{ fontSize:10, fontWeight:700, color, marginTop:2 }}>×{activity.count}</div>}
                  {isToday && !hasGoal && <div style={{ fontSize:9, color:"#1CB0F6", fontWeight:800, marginTop:1 }}>auj.</div>}
                </div>
              );
            })}
          </div>

          <div style={{ display:"flex", gap:12, marginTop:16, flexWrap:"wrap" }}>
            {[["#58CC02","✅ Objectif atteint"],["#FFC800","⚡ Partiel"],["#FF4B4B","❌ Rien ce jour"],["#1CB0F6","📍 Aujourd'hui"]].map(([c,l])=>(
              <div key={l} style={{ display:"flex", alignItems:"center", gap:6, fontSize:12, fontWeight:700, color:T.mt }}>
                <div style={{ width:12, height:12, borderRadius:4, background:c+"40", border:`2px solid ${c}` }} />{l}
              </div>
            ))}
          </div>
        </div>
      );
    }

      const [splashDone, setSplashDone] = useState(false);

      useEffect(() => {
        const t = setTimeout(() => {
          setSplashDone(true);
          const el = document.getElementById("pre-splash");
          if (el) { el.style.opacity = "0"; setTimeout(() => el.remove(), 500); }
        }, 2700);
        return () => clearTimeout(t);
      }, []);

      useEffect(() => { save(data); }, [data]);

      // ── Sync cloud → local au démarrage (priorité cloud si plus récent)
      useEffect(() => {
        if (synced) return;
        loadCloud().then(cloud => {
          if (!cloud) { setSynced(true); return; }
          const local = loadLocal();
          // Si cloud a plus d'XP ou plus de réponses → prend le cloud
          const cloudXP = cloud.xp || 0;
          const localXP = (local||{}).xp || 0;
          const cloudAns = Object.keys(cloud.answers||{}).length;
          const localAns = Object.keys((local||{}).answers||{}).length;
          if (cloudXP > localXP || cloudAns > localAns) {
            saveLocal(cloud);
            setData(cloud);
          }
          setSynced(true);
        });
      }, []);

      const T = TH[data.theme || "light"];
      const rank = getRank(data.xp||0);
      const nextRank = getNextRank(data.xp||0);
      const sub = subId ? EXERCISES[subId] : null;
      const weekData = sub?.weeks[weekN];
      const currentEx = weekData?.exercises[exIdx];

      const weekDone = (sid, w) => {
        const wk = EXERCISES[sid]?.weeks[w];
        if (!wk) return { done:0, total:0 };
        const done = wk.exercises.filter(ex => {
          const a = data.answers[ex.id];
          if (!a) return false;
          if (ex.type === "write") return a.status === "submitted" || a.status === "approved";
          return a.status === "correct";
        }).length;
        return { done, total: wk.exercises.length };
      };
      const totalProgress = () => {
        let done=0, total=0;
        Object.keys(EXERCISES).forEach(sid => { [1,2,3,4].forEach(w => { const r=weekDone(sid,w); done+=r.done; total+=r.total; }); });
        return total ? Math.round((done/total)*100) : 0;
      };

      const triggerSuccess = (msg, xpAmt=0) => { setFeedback({ type:"success", msg }); if(xpAmt>0){setAnimatedXP(xpAmt);setIsAnimatingXP(true);setTimeout(()=>setIsAnimatingXP(false),1500);} };
      const triggerPending = (msg, xpAmt=0) => { setFeedback({ type:"pending", msg }); if(xpAmt>0){setAnimatedXP(xpAmt);setIsAnimatingXP(true);setTimeout(()=>setIsAnimatingXP(false),1500);} };
      const triggerError   = (msg) => { setFeedback({ type:"error", msg }); setShakeUI(true); setTimeout(()=>setShakeUI(false),500); };

      const submitAnswer = () => {
        if (!currentEx) return;
        const ex = currentEx;
        const today = new Date().toDateString();

        if (ex.type === "numeric") {
          const val = parseFloat(input.replace(",","."));
          if (isNaN(val)) { triggerError("Oops ! Écris un nombre valide !"); return; }
          if (Math.abs(val - ex.answer) <= (ex.tolerance||0)) {
            setData(p => ({ ...p, answers:{ ...p.answers, [ex.id]:{ value:val, status:"correct", date:new Date().toISOString() }}, xp:(p.xp||0)+ex.xp, lastDate:today, streak:newStreak(p) }));
            triggerSuccess(`Génial ! +${ex.xp} XP 🚀`, ex.xp); setAttempts(0);
          } else {
            setAttempts(a=>a+1); triggerError(`Presque ! Ta réponse : ${val}. Réessaie.${attempts>=1&&ex.hint?` Indice : ${ex.hint}`:""}`);
          }
        }
        else if (ex.type === "multi") {
          if (selectedOption === null) { triggerError("Touche une réponse avant de valider !"); return; }
          if (selectedOption === ex.answer) {
            setData(p => ({ ...p, answers:{ ...p.answers, [ex.id]:{ value:selectedOption, status:"correct", date:new Date().toISOString() }}, xp:(p.xp||0)+ex.xp, lastDate:today, streak:newStreak(p) }));
            triggerSuccess(`Exactement ! +${ex.xp} XP 🎉`, ex.xp); setAttempts(0);
          } else {
            setAttempts(a=>a+1); triggerError("Aïe, ce n'est pas ça. Réessaie !"); setSelectedOption(null);
          }
        }
        else if (ex.type === "write") {
          if (input.trim().length < (ex.minChars||50)) { triggerError(`Encore un effort ! Il faut ${ex.minChars} lettres min. Tu en as ${input.trim().length}.`); return; }
          const prev = data.answers[ex.id];
          const xpAlreadyGiven = prev?.status==="submitted"||prev?.status==="redo";
          const xpToAdd = xpAlreadyGiven ? 0 : Math.round(ex.xp*0.5);
          setData(p => ({ ...p, answers:{ ...p.answers, [ex.id]:{ value:input.trim(), status:"submitted", date:new Date().toISOString() }}, xp:(p.xp||0)+xpToAdd, lastDate:today, streak:newStreak(p) }));
          if (xpToAdd > 0) triggerPending(`Super ! +${xpToAdd} XP ⏳ Papa valide pour le bonus !`, xpToAdd);
          else { setIsAnimatingXP(false); setFeedback({ type:"pending", msg:"Texte mis à jour ! Papa va regarder ça 👀" }); }
        }
      };

      const openExercise = (sid, w, idx) => { setSubId(sid); setWeekN(w); setExIdx(idx); setView("exercise"); setInput(""); setFeedback(null); setAttempts(0); setSelectedOption(null); };
      const goNext = () => { if(weekData&&exIdx<weekData.exercises.length-1){setExIdx(exIdx+1);setInput("");setFeedback(null);setAttempts(0);setSelectedOption(null);}else{setView("week");} };
      const approveAnswer = (exId, approved) => {
        setData(prev => {
          const ans = prev.answers[exId]; if(!ans) return prev;
          const ex = findExercise(exId);
          const bonusXP = approved&&ex ? Math.round(ex.xp*0.5) : 0;
          return { ...prev, answers:{ ...prev.answers, [exId]:{ ...ans, status:approved?"approved":"redo", reviewDate:new Date().toISOString() }}, xp:(prev.xp||0)+bonusXP };
        });
      };
      const pendingReviews = Object.entries(data.answers||{}).filter(([,a])=>a.status==="submitted");

      const card = { background:T.sf, border:`2px solid ${T.bd}`, borderBottomWidth:6, borderRadius:24, padding:20 };
      const btn = (bg) => ({ background:bg, color:"#fff", border:"none", borderRadius:20, padding:"16px 24px", fontWeight:800, fontSize:18, cursor:"pointer", fontFamily:"Nunito,sans-serif", display:"inline-flex", alignItems:"center", justifyContent:"center", gap:12, width:"100%", boxShadow:`0 6px 0 ${getDarker(bg)}`, transition:"transform 0.1s, box-shadow 0.1s" });

      return (
        <div style={{ fontFamily:"Nunito,sans-serif", background:T.bg, color:T.tx, minHeight:"100vh", maxWidth:500, margin:"0 auto", transition:"background 0.3s,color 0.3s", overflowX:"hidden" }}>
          <style>{`
            @keyframes splashFadeOut { to { opacity:0; pointer-events:none; } }
            @keyframes splashPopIn   { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
            @keyframes bounceBall    { from{transform:translateY(0) rotate(0deg)} to{transform:translateY(-28px) rotate(20deg)} }
            @keyframes loadBar       { from{width:0} to{width:100%} }
            @keyframes drift         { 0%,100%{transform:translate(0,0)} 50%{transform:translate(12px,-12px)} }
            @keyframes popIn         { 0%{opacity:0;transform:scale(0.8)} 70%{transform:scale(1.05)} 100%{opacity:1;transform:scale(1)} }
            @keyframes shake         { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
            @keyframes floatUp       { 0%{transform:translateY(0) scale(0.8);opacity:0} 20%{transform:translateY(-20px) scale(1.2);opacity:1} 100%{transform:translateY(-100px) scale(1);opacity:0} }
            .pop  { animation:popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275) both; }
            .push:active { transform:translateY(5px) !important; box-shadow:none !important; }
            .shake { animation:shake 0.5s both; }
            textarea,input { font-family:Nunito,sans-serif; transition:all 0.2s; }
            textarea:focus,input:focus { outline:none; }
            *{box-sizing:border-box}
          `}</style>

          {/* ── SPLASH ── */}
          {!splashDone && <SplashScreen theme={data.theme||"light"} />}

          {/* ── XP ANIM ── */}
          {isAnimatingXP && (
            <div style={{ position:"fixed", top:"30%", left:"50%", transform:"translate(-50%,-50%)", zIndex:999, pointerEvents:"none" }}>
              <div style={{ fontWeight:900, fontSize:64, color:T.ok, textShadow:`0 4px 0 ${T.okDark}`, animation:"floatUp 1.5s ease-out forwards" }}>+{animatedXP}</div>
            </div>
          )}

          {/* ── HEADER ── */}
          <div style={{ position:"sticky", top:0, zIndex:50, background:T.bg, padding:"20px 24px 16px", borderBottom:`2px solid ${T.bd}`, display:view==="entry"?"none":"block" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                {(view!=="home"&&view!=="parent"&&view!=="entry") && (
                  <button className="push" onClick={()=>{setView(view==="exercise"?"week":"home");setFeedback(null);}} style={{ background:"none", border:"none", color:T.mt, fontSize:16, fontWeight:800, cursor:"pointer", marginBottom:8, display:"flex", alignItems:"center", gap:4 }}>
                    <span style={{ fontSize:22 }}>←</span> Accueil
                  </button>
                )}
                {view==="home" && (
                  <button className="push" onClick={()=>setView("entry")} style={{ background:"none", border:"none", color:T.mt, fontSize:13, fontWeight:800, cursor:"pointer", marginBottom:8, display:"flex", alignItems:"center", gap:4 }}>
                    <span style={{ fontSize:16 }}>⇄</span> Changer
                  </button>
                )}
                {view==="parent" && (
                  <button className="push" onClick={()=>{setParentMode(false);setView("entry");}} style={{ background:"none", border:"none", color:T.mt, fontSize:16, fontWeight:800, cursor:"pointer", marginBottom:8, display:"flex", alignItems:"center", gap:4 }}>
                    <span style={{ fontSize:22 }}>←</span> Retour
                  </button>
                )}
                <div style={{ fontSize:26, fontWeight:900, color:T.tx, marginTop:view==="home"?8:0 }}>
                  {view==="entry"?"":view==="home"?"Aydann Champions Work":view==="rewards"?"🎁 Récompenses":view==="glossary"?"📖 Glossaire":view==="calendar"?"📅 Calendrier":view==="parent"?"Coin Parents 🛡️":view==="week"&&sub?sub.name:view==="exercise"&&sub?"Mission !":""}
                </div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                {(data.streak||0)>1 && <div style={{ background:T.warn+"25", border:`2px solid ${T.warn}60`, borderRadius:16, padding:"6px 10px", fontSize:14, fontWeight:800, color:T.warn }}>🔥{data.streak}j</div>}
                <button className="push" onClick={()=>setData(p=>({...p,theme:p.theme==="dark"?"light":"dark"}))} style={{ background:T.sf, border:`2px solid ${T.bd}`, borderBottomWidth:4, borderRadius:"50%", width:46, height:46, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", fontSize:22 }}>
                  {data.theme==="dark"?"☀️":"🌙"}
                </button>
              </div>
            </div>
            {/* XP Bar */}
            <div style={{ marginTop:20, display:"flex", alignItems:"center", gap:14, background:T.sf, padding:14, borderRadius:22, border:`2px solid ${T.bd}`, borderBottomWidth:5 }}>
              <div style={{ flexShrink:0, width:52, height:52, borderRadius:18, background:T.warn, display:"flex", alignItems:"center", justifyContent:"center", fontSize:28, boxShadow:`0 4px 0 ${T.warnDark}` }}>⚡</div>
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                  <div style={{ fontSize:22, fontWeight:900 }}>{data.xp||0} <span style={{ fontSize:14, color:T.mt, fontWeight:700 }}>XP</span></div>
                  <div style={{ fontSize:14, fontWeight:800, color:T.acc }}>{rank.name}</div>
                </div>
                {nextRank ? (
                  <div style={{ height:10, background:T.bd, borderRadius:5, overflow:"hidden" }}>
                    <div style={{ height:"100%", width:`${Math.min(100,((data.xp-rank.xp)/(nextRank.xp-rank.xp))*100)}%`, background:T.warn, borderRadius:5, transition:"width 0.5s ease" }} />
                  </div>
                ) : (
                  <div style={{ fontSize:13, color:T.ok, fontWeight:800 }}>Niveau Max ! 🏆</div>
                )}
              </div>
            </div>
          </div>

          {/* ── CONTENU ── */}
          <div style={{ padding:view==="entry"?"0":"24px 20px 120px" }}>

            {/* ═══ HOME ═══ */}
                        {view==="entry" && <EntryView T={T} data={data} setView={setView} setParentMode={setParentMode} totalProgress={totalProgress} />}

            {view==="home" && <>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20, padding:"0 4px" }}>
                <div style={{ fontSize:20, fontWeight:800 }}>Choisis ton challenge</div>
                <div style={{ background:T.ok+"25", border:`2px solid ${T.ok}40`, borderRadius:14, padding:"4px 12px", fontSize:14, fontWeight:800, color:T.ok }}>{totalProgress()}% ✅</div>
              </div>
              {Object.entries(EXERCISES).map(([sid, s], idx) => {
                let done=0,total=0; [1,2,3,4].forEach(w=>{const r=weekDone(sid,w);done+=r.done;total+=r.total;});
                const pct=total?Math.round((done/total)*100):0;
                return (
                  <div key={sid} className="pop push" onClick={()=>{setSubId(sid);setView("week");setWeekN(1);}} style={{ ...card, cursor:"pointer", marginBottom:16, animationDelay:`${idx*0.05}s`, borderColor:pct===100?T.ok:T.bd, background:pct===100?T.ok+"10":T.sf, position:"relative" }}>
                    {pct===100&&<div style={{ position:"absolute", top:-10, right:-10, fontSize:28 }}>⭐</div>}
                    <div style={{ display:"flex", alignItems:"center", gap:14 }}>
                      <div style={{ width:60, height:60, borderRadius:18, background:s.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:30, boxShadow:`0 4px 0 ${getDarker(s.color)}` }}>{s.icon}</div>
                      <div style={{ flex:1 }}>
                        <div style={{ fontWeight:800, fontSize:18, marginBottom:8 }}>{s.name}</div>
                        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                          <div style={{ flex:1, height:10, background:T.bd, borderRadius:5, overflow:"hidden" }}>
                            <div style={{ height:"100%", width:`${pct}%`, background:pct===100?T.ok:s.color, borderRadius:5 }} />
                          </div>
                          <div style={{ fontSize:14, fontWeight:800, color:pct===100?T.ok:T.mt, width:36, textAlign:"right" }}>{pct}%</div>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
              {/* ── NAVIGATION EXTRA ── */}
              <div style={{ display:"flex", gap:8, marginTop:16, flexWrap:"wrap" }}>
                <button className="push" onClick={()=>setView("rewards")}
                  style={{ flex:1, minWidth:90, background:"linear-gradient(135deg,#FFC800,#e5b200)", border:"none", borderBottomWidth:5, borderRadius:20, padding:"14px 10px", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:6, boxShadow:"0 5px 0 #b89100" }}>
                  <div style={{ fontSize:28 }}>🎁</div>
                  <div style={{ fontWeight:800, fontSize:13, color:"#000" }}>Récompenses</div>
                  <div style={{ fontSize:11, color:"rgba(0,0,0,0.6)", fontWeight:700 }}>Mes paliers</div>
                </button>
                <button className="push" onClick={()=>setView("calendar")}
                  style={{ flex:1, background:T.sf, border:`2px solid ${T.bd}`, borderBottomWidth:5, borderRadius:20, padding:16, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:6 }}>
                  <div style={{ fontSize:32 }}>📅</div>
                  <div style={{ fontWeight:800, fontSize:14, color:T.tx }}>Calendrier</div>
                  <div style={{ fontSize:12, color:T.mt, fontWeight:700 }}>Suivi journalier</div>
                </button>
                <button className="push" onClick={()=>setView("glossary")}
                  style={{ flex:1, background:T.sf, border:`2px solid ${T.bd}`, borderBottomWidth:5, borderRadius:20, padding:16, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:6 }}>
                  <div style={{ fontSize:32 }}>📖</div>
                  <div style={{ fontWeight:800, fontSize:14, color:T.tx }}>Glossaire</div>
                  <div style={{ fontSize:12, color:T.mt, fontWeight:700 }}>Comprendre les règles</div>
                </button>
              </div>

            </>}

            {/* ═══ SEMAINES ═══ */}
            {view==="week"&&sub && <>
              <div style={{ display:"flex", gap:8, marginBottom:20 }}>
                {[1,2,3,4].map(w=>{const r=weekDone(subId,w);const active=weekN===w;return(
                  <button className="push" key={w} onClick={()=>setWeekN(w)} style={{ flex:1, padding:"10px 0", borderRadius:18, border:`2px solid ${active?sub.color:T.bd}`, borderBottomWidth:active?6:4, cursor:"pointer", fontSize:14, fontWeight:800, background:active?sub.color:T.sf, color:active?"#fff":T.mt, display:"flex", flexDirection:"column", alignItems:"center", gap:3 }}>
                    Match {w}<div style={{ fontSize:11 }}>{r.done}/{r.total}</div>
                  </button>
                );})}
              </div>
              {weekData && <>
                <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:20, padding:"0 4px" }}>
                  <div style={{ fontSize:26 }}>{sub.icon}</div>
                  <div style={{ fontSize:22, fontWeight:900 }}>{weekData.title}</div>
                </div>
                {weekData.exercises.map((ex, idx) => {
                  const ans = data.answers[ex.id];
                  const status = ans?.status;
                  const isDone = status==="correct"||status==="approved";
                  const isPending = status==="submitted";
                  const isRedo = status==="redo";
                  const border = isDone?T.ok:isPending?T.warn:isRedo?T.err:T.bd;
                  const icon = isDone?"✅":isPending?"⏳":isRedo?"🔄":"🎯";
                  return (
                    <div key={ex.id} className="pop push" onClick={()=>{ if(!isDone||isRedo) openExercise(subId,weekN,idx); }} style={{ ...card, marginBottom:14, cursor:isDone&&!isRedo?"default":"pointer", border:`2px solid ${border}`, borderBottomWidth:6, background:isDone?T.ok+"10":isPending?T.warn+"10":isRedo?T.err+"10":T.sf, animationDelay:`${idx*0.04}s`, opacity:isDone&&!isRedo?0.75:1, position:"relative" }}>
                      <div style={{ display:"flex", gap:14, alignItems:"center" }}>
                        <div style={{ flexShrink:0, width:46, height:46, borderRadius:14, background:T.bg, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, border:`2px solid ${border}` }}>{icon}</div>
                        <div style={{ flex:1 }}>
                          <div style={{ display:"flex", gap:8, marginBottom:6 }}>
                            {ex.tag&&<span style={{ fontSize:11, color:ex.tag==="fut"?T.warn:T.ok, fontWeight:900 }}>{ex.tag==="fut"?"🎮 FUT":"⚽ FOOT"}</span>}
                            <span style={{ fontSize:11, fontWeight:900, color:T.acc }}>+{ex.xp} XP</span>
                          </div>
                          <div style={{ fontSize:15, fontWeight:700, lineHeight:1.4 }}>{ex.q.length>90?ex.q.slice(0,90)+"...":ex.q}</div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </>}
            </>}

            {/* ═══ EXERCICE ═══ */}
            {view==="exercise"&&currentEx && <>
              <div className="pop">
                <div style={{ textAlign:"center", marginBottom:24 }}>
                  <span style={{ background:T.sf, border:`2px solid ${T.bd}`, color:T.mt, padding:"8px 16px", borderRadius:20, fontSize:13, fontWeight:800, textTransform:"uppercase" }}>Étape {exIdx+1}/{weekData.exercises.length}</span>
                </div>
                <div style={{ fontSize:24, lineHeight:1.4, fontWeight:800, textAlign:"center", marginBottom:28, color:T.tx }}>{currentEx.q}</div>

                {(data.answers[currentEx.id]?.status==="correct"||data.answers[currentEx.id]?.status==="approved") && (
                  <div style={{ textAlign:"center", padding:36, background:T.ok+"15", borderRadius:28, border:`4px solid ${T.ok}` }}>
                    <div style={{ fontSize:56, marginBottom:12 }}>🏆</div>
                    <div style={{ color:T.okDark, fontSize:22, fontWeight:900, marginBottom:10 }}>Gagné !</div>
                    <div style={{ fontSize:16, color:T.tx, marginBottom:28, fontWeight:600 }}>{typeof data.answers[currentEx.id].value==="string"?"Texte bien enregistré.":`Ta réponse : ${data.answers[currentEx.id].value}`}</div>
                    <button className="push" onClick={goNext} style={btn(T.acc)}>On continue ! →</button>
                  </div>
                )}
                {data.answers[currentEx.id]?.status==="submitted" && (
                  <div style={{ textAlign:"center", padding:36, background:T.warn+"15", borderRadius:28, border:`4px solid ${T.warn}` }}>
                    <div style={{ fontSize:56, marginBottom:12 }}>⏳</div>
                    <div style={{ color:T.warnDark, fontSize:22, fontWeight:900, marginBottom:10 }}>Envoyé !</div>
                    <div style={{ fontSize:16, color:T.tx, marginBottom:28, fontWeight:600 }}>Papa va lire ton texte. Reviens après !</div>
                    <button className="push" onClick={goNext} style={btn(T.acc)}>On continue ! →</button>
                  </div>
                )}

                {!(data.answers[currentEx.id]?.status==="correct"||data.answers[currentEx.id]?.status==="approved"||data.answers[currentEx.id]?.status==="submitted") && (
                  <div className={shakeUI?"shake":""}>
                    {currentEx.type==="numeric" && (
                      <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submitAnswer()} placeholder="0" type="text" inputMode="decimal" style={{ width:"100%", padding:22, background:T.sf, border:`4px solid ${feedback?.type==="error"?T.err:T.bd}`, borderRadius:22, color:T.tx, fontSize:44, fontWeight:900, textAlign:"center" }} />
                    )}
                    {currentEx.type==="multi" && (
                      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                        {currentEx.options.map((opt,i)=>(
                          <button className="push" key={i} onClick={()=>setSelectedOption(i)} style={{ width:"100%", padding:18, borderRadius:18, border:`${selectedOption===i?"3px":"2px"} solid ${selectedOption===i?T.acc:T.bd}`, borderBottomWidth:selectedOption===i?5:4, background:selectedOption===i?T.acc+"15":T.sf, color:T.tx, fontSize:17, fontWeight:700, textAlign:"left", cursor:"pointer", display:"flex", alignItems:"center", gap:14 }}>
                            <div style={{ width:38, height:38, borderRadius:"50%", background:selectedOption===i?T.acc:T.bg, color:selectedOption===i?"#fff":T.tx, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:900, border:`2px solid ${selectedOption===i?T.acc:T.bd}` }}>{i+1}</div>
                            {opt}
                          </button>
                        ))}
                      </div>
                    )}
                    {currentEx.type==="write" && (
                      <div>
                        <textarea value={input} onChange={e=>setInput(e.target.value)} placeholder="Commence à écrire ici..." style={{ width:"100%", padding:18, background:T.sf, border:`4px solid ${T.bd}`, borderRadius:22, color:T.tx, fontSize:17, fontWeight:600, lineHeight:1.6, resize:"vertical", minHeight:200 }} />
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:10, padding:"0 6px" }}>
                          <div style={{ fontSize:14, fontWeight:800, color:input.trim().length>=(currentEx.minChars||50)?T.ok:T.mt }}>{input.trim().length} / {currentEx.minChars||50} lettres min</div>
                          {input.trim().length>=(currentEx.minChars||50)&&<div style={{ fontSize:22 }}>✅</div>}
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {feedback && !(data.answers[currentEx.id]?.status==="correct"||data.answers[currentEx.id]?.status==="approved"||data.answers[currentEx.id]?.status==="submitted") && (
                  <div className="pop" style={{ marginTop:20, padding:"14px 18px", borderRadius:18, display:"flex", alignItems:"center", gap:14, background:feedback.type==="success"?T.ok+"15":feedback.type==="pending"?T.warn+"15":T.err+"15", border:`3px solid ${feedback.type==="success"?T.ok:feedback.type==="pending"?T.warn:T.err}` }}>
                    <div style={{ fontSize:28 }}>{feedback.type==="success"?"🎉":feedback.type==="pending"?"⏳":"❌"}</div>
                    <div style={{ color:feedback.type==="success"?T.okDark:feedback.type==="pending"?T.warnDark:T.errDark, fontWeight:800, fontSize:16, lineHeight:1.3 }}>{feedback.msg}</div>
                  </div>
                )}

                {!(data.answers[currentEx.id]?.status==="correct"||data.answers[currentEx.id]?.status==="approved"||data.answers[currentEx.id]?.status==="submitted") && (
                  <div style={{ marginTop:28 }}>
                    {(!feedback||feedback.type==="error") && <button className="push" onClick={submitAnswer} style={btn(sub.color)}>{currentEx.type==="write"?"Envoyer ! 📤":"Vérifier ! ✓"}</button>}
                    {(feedback?.type==="success"||feedback?.type==="pending") && <button className="push" onClick={goNext} style={btn(T.ok)}>Continuer <span style={{ fontSize:18 }}>→</span></button>}
                  </div>
                )}
              </div>
            </>}

            
            {/* ═══ COIN PARENTS ═══ */}
            {view==="parent"&&parentMode && (() => {
              // ── Stats calculées ──
              const today = new Date();
              const month = today.getMonth(), year = today.getFullYear();
              const daysInMonth = new Date(year, month+1, 0).getDate();
              let activeDays = 0;
              const activeDaySet = new Set();
              Object.values(data.answers||{}).forEach(a => {
                if (!a.date) return;
                const d = new Date(a.date);
                if (d.getMonth()===month && d.getFullYear()===year) {
                  activeDaySet.add(d.getDate());
                }
              });
              activeDays = activeDaySet.size;
              const daysPassed = today.getDate();
              const dayPct = daysPassed > 0 ? Math.round((activeDays/daysPassed)*100) : 0;

              // Progression par matière
              const subjectStats = Object.entries(EXERCISES).map(([sid, s]) => {
                let done=0, total=0;
                [1,2,3,4].forEach(w => { const r=weekDone(sid,w); done+=r.done; total+=r.total; });
                return { sid, name:s.name, icon:s.icon, color:s.color, done, total, pct: total ? Math.round((done/total)*100) : 0 };
              });

              // Progression par match (global)
              const matchStats = [1,2,3,4].map(w => {
                let done=0, total=0;
                Object.keys(EXERCISES).forEach(sid => { const r=weekDone(sid,w); done+=r.done; total+=r.total; });
                return { w, done, total, pct: total ? Math.round((done/total)*100) : 0 };
              });

              // Obj journalier aujourd'hui
              const todayKey = `${year}-${month}-${today.getDate()}`;
              const todayDone = Object.values(data.answers||{}).filter(a => {
                if (!a.date) return false;
                const d = new Date(a.date);
                return d.getFullYear()===year && d.getMonth()===month && d.getDate()===today.getDate();
              }).length;
              const todayGoalMet = todayDone >= 1;

              return (
                <>
                  {/* ── En-tête parent ── */}
                  <div className="pop" style={{ background:"linear-gradient(135deg,#FF6B35,#e85d00)", borderRadius:24, padding:"20px 22px", marginBottom:18, display:"flex", alignItems:"center", gap:14, boxShadow:"0 6px 0 #b84500" }}>
                    <div style={{ fontSize:42 }}>🛡️</div>
                    <div>
                      <div style={{ fontSize:22, fontWeight:900, color:"#fff" }}>Dashboard Parent</div>
                      <div style={{ fontSize:13, color:"rgba(255,255,255,0.85)", fontWeight:700 }}>Suivi en temps réel · Aydann</div>
                    </div>
                  </div>

                  {/* ── KPIs ── */}
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:18 }}>
                    {[
                      ["⚡","Total XP", data.xp||0, "#1CB0F6"],
                      ["🔥","Série", `${data.streak||0}j`, "#FF9600"],
                      ["📈","Progression", `${totalProgress()}%`, "#58CC02"],
                      ["⏳","En attente", pendingReviews.length, pendingReviews.length>0?"#FF4B4B":"#58CC02"]
                    ].map(([icon,label,val,color]) => (
                      <div key={label} className="pop" style={{ background:T.sf, border:`2px solid ${T.bd}`, borderBottomWidth:5, borderRadius:20, padding:"16px 12px", textAlign:"center" }}>
                        <div style={{ fontSize:26, marginBottom:4 }}>{icon}</div>
                        <div style={{ fontSize:11, color:T.mt, fontWeight:800, textTransform:"uppercase", marginBottom:2 }}>{label}</div>
                        <div style={{ fontSize:28, fontWeight:900, color }}>{val}</div>
                      </div>
                    ))}
                  </div>

                  {/* ── Objectif journalier ── */}
                  <div className="pop" style={{ background:todayGoalMet?"#58CC0215":"#FF4B4B10", border:`2px solid ${todayGoalMet?"#58CC02":"#FF4B4B"}`, borderBottomWidth:5, borderRadius:20, padding:"14px 18px", marginBottom:18, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                    <div>
                      <div style={{ fontWeight:900, fontSize:16 }}>Objectif du jour</div>
                      <div style={{ fontSize:13, color:T.mt, fontWeight:700 }}>{todayDone} exercice{todayDone!==1?"s":""} aujourd'hui</div>
                    </div>
                    <div style={{ fontSize:32 }}>{todayGoalMet?"✅":"❌"}</div>
                  </div>

                  {/* ── Activité du mois ── */}
                  <div className="pop" style={{ background:T.sf, border:`2px solid ${T.bd}`, borderBottomWidth:5, borderRadius:20, padding:"16px 18px", marginBottom:18 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                      <div style={{ fontWeight:900, fontSize:16 }}>📅 Activité du mois</div>
                      <div style={{ fontWeight:900, fontSize:18, color: dayPct>=80?"#58CC02":dayPct>=50?"#FFC800":"#FF4B4B" }}>{dayPct}%</div>
                    </div>
                    <div style={{ height:8, background:T.bd, borderRadius:4, overflow:"hidden", marginBottom:8 }}>
                      <div style={{ height:"100%", width:`${dayPct}%`, background:dayPct>=80?"#58CC02":dayPct>=50?"#FFC800":"#FF4B4B", borderRadius:4, transition:"width 0.6s ease" }} />
                    </div>
                    <div style={{ fontSize:13, color:T.mt, fontWeight:700 }}>{activeDays} jour{activeDays!==1?"s":""} actif{activeDays!==1?"s":""} sur {daysPassed} jour{daysPassed!==1?"s":""} écoulés</div>
                  </div>

                  {/* ── Progression par matière ── */}
                  <div className="pop" style={{ background:T.sf, border:`2px solid ${T.bd}`, borderBottomWidth:5, borderRadius:20, padding:"16px 18px", marginBottom:18 }}>
                    <div style={{ fontWeight:900, fontSize:16, marginBottom:14 }}>📚 Par matière</div>
                    {subjectStats.map(s => (
                      <div key={s.sid} style={{ marginBottom:12 }}>
                        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                          <div style={{ fontWeight:800, fontSize:14 }}>{s.icon} {s.name}</div>
                          <div style={{ fontWeight:900, fontSize:14, color:s.color }}>{s.pct}% <span style={{ fontSize:11, color:T.mt, fontWeight:700 }}>({s.done}/{s.total})</span></div>
                        </div>
                        <div style={{ height:8, background:T.bd, borderRadius:4, overflow:"hidden" }}>
                          <div style={{ height:"100%", width:`${s.pct}%`, background:s.color, borderRadius:4, transition:"width 0.6s ease" }} />
                        </div>
                      </div>
                    ))}
                  </div>

                  {/* ── Progression par match ── */}
                  <div className="pop" style={{ background:T.sf, border:`2px solid ${T.bd}`, borderBottomWidth:5, borderRadius:20, padding:"16px 18px", marginBottom:18 }}>
                    <div style={{ fontWeight:900, fontSize:16, marginBottom:14 }}>⚽ Par match</div>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                      {matchStats.map(m => (
                        <div key={m.w} style={{ background:T.bg, border:`2px solid ${T.bd}`, borderRadius:14, padding:"12px 14px" }}>
                          <div style={{ fontWeight:900, fontSize:15, marginBottom:6 }}>Match {m.w}</div>
                          <div style={{ height:6, background:T.bd, borderRadius:3, overflow:"hidden", marginBottom:5 }}>
                            <div style={{ height:"100%", width:`${m.pct}%`, background:m.pct>=80?"#58CC02":m.pct>=40?"#FFC800":"#1CB0F6", borderRadius:3 }} />
                          </div>
                          <div style={{ fontSize:12, color:T.mt, fontWeight:800 }}>{m.done}/{m.total} · {m.pct}%</div>
                        </div>
                      ))}
                    </div>
                  </div>


                  {/* ── Récompenses réclamées — à valider ── */}
                  {(() => {
                    const claimedRewards = REWARDS.filter(rw => (data.rewards||{})[rw.id]?.status === "claimed");
                    if (claimedRewards.length === 0) return null;
                    return (
                      <div className="pop" style={{ background:T.sf, border:`2px solid #FFC800`, borderBottomWidth:5, borderRadius:20, padding:"16px 18px", marginBottom:18 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16 }}>
                          <div style={{ fontSize:28 }}>🎁</div>
                          <div>
                            <div style={{ fontSize:18, fontWeight:900 }}>Récompenses à donner</div>
                            <div style={{ fontSize:13, color:T.mt, fontWeight:700 }}>{claimedRewards.length} récompense{claimedRewards.length>1?"s":""} réclamée{claimedRewards.length>1?"s":""}</div>
                          </div>
                        </div>
                        {claimedRewards.map(rw => {
                          const st = (data.rewards||{})[rw.id];
                          return (
                            <div key={rw.id} style={{ background:T.bg, border:`2px solid #FFC800`, borderBottomWidth:4, borderRadius:16, padding:"12px 14px", marginBottom:10 }}>
                              <div style={{ fontWeight:900, fontSize:15, marginBottom:4 }}>{rw.rank}</div>
                              <div style={{ background:T.sf, borderRadius:10, padding:"8px 12px", fontSize:14, fontWeight:700, color:T.tx, marginBottom:12 }}>
                                {rw.options[st?.option ?? 0]}
                              </div>
                              <button className="push" onClick={()=>setData(p=>({...p, rewards:{...p.rewards, [rw.id]:{...p.rewards[rw.id], status:"given", givenDate:new Date().toISOString()}}}))}
                                style={{ background:"#58CC02", color:"#fff", border:"none", borderRadius:12, padding:"10px 16px", fontWeight:900, cursor:"pointer", fontSize:14, width:"100%", boxShadow:"0 4px 0 #46A302" }}>
                                ✅ J'ai donné cette récompense
                              </button>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })()}

                  {/* ── Corrections en attente ── */}
                  <div className="pop" style={{ background:T.sf, border:`2px solid ${T.bd}`, borderBottomWidth:5, borderRadius:20, padding:"16px 18px", marginBottom:18 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16 }}>
                      <div style={{ fontSize:28 }}>📬</div>
                      <div>
                        <div style={{ fontSize:18, fontWeight:900 }}>Corrections en attente</div>
                        <div style={{ fontSize:13, color:T.mt, fontWeight:700 }}>{pendingReviews.length} texte{pendingReviews.length!==1?"s":""} à lire</div>
                      </div>
                    </div>

                    {pendingReviews.length===0 ? (
                      <div style={{ textAlign:"center", padding:32, background:T.bg, borderRadius:18, border:`2px dashed ${T.bd}` }}>
                        <div style={{ fontSize:48, marginBottom:10 }}>🎉</div>
                        <div style={{ fontWeight:800, color:T.mt, fontSize:16 }}>Tout est à jour !</div>
                      </div>
                    ) : pendingReviews.map(([exId, ans]) => {
                      const ex = findExercise(exId); if(!ex) return null;
                      return (
                        <div key={exId} style={{ background:T.bg, border:`3px solid ${T.warn}`, borderBottomWidth:6, borderRadius:20, marginBottom:16, overflow:"hidden" }}>
                          <div style={{ background:T.warn+"20", padding:"14px 16px", borderBottom:`2px solid ${T.warn}40` }}>
                            <div style={{ fontSize:11, color:T.warnDark, fontWeight:900, textTransform:"uppercase", marginBottom:5 }}>Texte soumis</div>
                            <div style={{ fontSize:15, fontWeight:800, lineHeight:1.4 }}>{ex.q}</div>
                          </div>
                          <div style={{ padding:16 }}>
                            <div style={{ background:T.sf, borderRadius:12, padding:14, fontSize:14, lineHeight:1.6, whiteSpace:"pre-wrap", border:`2px solid ${T.bd}`, fontWeight:600 }}>{ans.value}</div>
                            <div style={{ display:"flex", gap:10, marginTop:14 }}>
                              <button className="push" onClick={()=>approveAnswer(exId,true)} style={{ ...btn(T.ok), padding:12, fontSize:14, flex:1 }}>✅ Approuver +{Math.round((ex.xp||0)*0.5)} XP</button>
                              <button className="push" onClick={()=>approveAnswer(exId,false)} style={{ ...btn(T.err), padding:12, fontSize:14, flex:1 }}>🔄 À refaire</button>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </>
              );
            })()}

            {view==="rewards" && <RewardsView T={T} data={data} setData={setData} />}
            {view==="glossary" && <GlossaryView T={T} />}
            {view==="calendar" && <CalendarView T={T} data={data} getDarker={getDarker} />}

          </div>
        </div>
      );
    }

    // ─── Masquer le pre-splash natif et monter React ───
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
